<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra-Advanced 3D Interface</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

    :root {
      --neon-blue: #00d2ff;
      --neon-purple: #9d50bb;
      --bg-dark: #020205;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg-dark);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .login-container {
      position: relative;
      z-index: 10;
      perspective: 1000px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px;
      width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      transform-style: preserve-3d;
      text-align: center;
    }

    .login-card h2, .login-card p, .login-card div, .login-card button {
      transform: translateZ(50px); 
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      font-weight: 700;
      text-shadow: 0 0 10px var(--neon-blue);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .form-control {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 5px;
      padding: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
    }

    .form-control:focus {
      background: rgba(0, 0, 0, 0.6);
      border-color: var(--neon-blue);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
      color: #fff;
    }

    .btn-login {
      background: transparent;
      border: 2px solid var(--neon-blue);
      color: var(--neon-blue);
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.4s;
    }

    .btn-login:hover {
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 30px var(--neon-blue);
    }

    .scanner-line {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--neon-blue);
      box-shadow: 0 0 15px var(--neon-blue);
      animation: scan 4s linear infinite;
      z-index: 5;
      opacity: 0.5;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
    .btn-login::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
  }
  .btn-login:hover::before {
    left: 100%;
  }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="login-container">
    <div class="login-card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.3">
      <div class="scanner-line"></div>
      <h2>NEURAL_AUTH</h2>
      <p class="text-white-50 mb-4">BIOMETRIC HANDSHAKE REQUIRED</p>

      <form>
        <div class="form-group">
          <input type="text" class="form-control" placeholder="ACCESS_ID" required>
        </div>
        <div class="form-group">
          <input type="password" class="form-control" placeholder="SECURE_PHRASE" required>
        </div>
        <button type="submit" class="btn btn-login">ESTABLISH UPLINK</button>
      </form>
      
      <div class="mt-4">
        <small style="color: #444; letter-spacing: 2px;">ENCRYPTION: AES-256-GCM</small>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles;

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.life = Math.random() * 100 + 100;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 0.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 210, 255, ${this.life / 200})`;
        ctx.fill();
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
          this.reset();
        }
      }
    }

    function init() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      particles = Array.from({ length: 150 }, () => new Particle());
    }

    function animate() {
      ctx.fillStyle = 'rgba(2, 2, 5, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();

    VanillaTilt.init(document.querySelector(".login-card"));
  </script>
</body>
</html>
